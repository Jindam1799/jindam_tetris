<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 테트리스</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap"
      rel="stylesheet"
    />

    <div
      id="action-text"
      class="hidden"
      style="font-family: 'Ma Shan Zheng', cursive"
    >
      痛快
    </div>
    <div id="flash-effect" class="hidden"></div>
  </head>
  <body>
    <div
      style="
        font-family: 'Ma Shan Zheng', cursive;
        position: absolute;
        opacity: 0;
        pointer-events: none;
      "
    >
      font preload
    </div>
    <div id="game-wrapper">
      <div id="game-container">
        <!-- ✨ 1. 항상 떠 있는 고정 타이틀 -->
        <div id="persistent-title">진담중국어 테트리스</div>

        <!-- ✨ 2. 접속 시 가장 먼저 보이는 인트로 화면 -->
        <div id="intro-overlay">
          <div class="intro-content">
            <h2 class="blink">아무 키나 누르면 로비로 들어갑니다.</h2>
          </div>
        </div>

        <canvas id="tetris" width="400" height="800"></canvas>

        <div id="explosion-effect" class="hidden">💥</div>

        <!-- 인트로부터 시작하므로 처음에 로비는 hidden 상태 -->
        <div id="lobby-ui" class="hidden">
          <h1 class="lobby-title">CHINESE<br />TETRIS</h1>
          <p style="margin-bottom: 25px; color: #ccc">
            도전할 난이도를 선택하세요
          </p>
          <button id="normal-btn" class="mode-btn normal-mode">
            NORMAL MODE
            <span>기본 속도 / 일반 블록 전용</span>
          </button>
          <button id="hell-btn" class="mode-btn hell-mode">
            HELL MODE
            <span>빠른 속도 / 특수 블록 등장(10%)</span>
          </button>
        </div>

        <div id="quiz-ui" class="hidden">
          <h2 id="quiz-word">단어</h2>
          <p id="quiz-question">질문</p>
          <div id="quiz-options"></div>
          <p id="quiz-timer">남은 시간: <span id="time-left">5</span>초</p>
        </div>

        <div id="level-clear-ui" class="hidden">
          <h1 class="clear-title" style="color: #f1c40f">LEVEL CLEAR!</h1>
          <div class="stats-box">
            <p>소요 시간: <span id="level-time">00:00</span></p>
            <p>최대 콤보: <span id="level-combo">0</span></p>
            <p>획득 점수: <span id="level-score">0</span></p>
          </div>
          <button
            id="next-level-btn"
            class="option-btn"
            style="background-color: #2ecc71"
          >
            다음 레벨로 진행
          </button>
        </div>

        <div id="game-over-ui" class="hidden">
          <h1>GAME OVER</h1>
          <p>SCORE: <span id="final-score"></span></p>
          <p>LEVEL: <span id="final-level"></span></p>
          <p>LINES: <span id="final-lines"></span></p>

          <div style="margin: 20px 0">
            <input
              type="text"
              id="player-name"
              placeholder="닉네임 (최대 6자)"
              maxlength="6"
              autocomplete="off"
            />
            <br />
            <button id="save-rank-btn">기록 저장 및 랭킹 보기</button>
          </div>

          <button id="restart-btn">메인 화면으로</button>
        </div>

        <div id="ranking-ui" class="hidden">
          <h1>🏆 명예의전당</h1>
          <div class="rank-tabs">
            <button id="tab-normal" class="active">🟢 NORMAL</button>
            <button id="tab-hell">🔥 HELL</button>
          </div>
          <div class="rank-list-header">
            <span style="width: 15%">순위</span>
            <span style="width: 35%">닉네임</span>
            <span style="width: 30%">점수</span>
            <span style="width: 20%">레벨</span>
          </div>
          <ul id="rank-list"></ul>
          <button id="close-rank-btn">닫기 (메인 화면)</button>
        </div>

        <div id="action-text" class="hidden">TETRIS!</div>
        <div id="item-notification" class="hidden">아이템 획득!</div>
      </div>

      <div id="side-panel">
        <h2 class="panel-title lines-title">
          남은 줄: <span id="lines-left">30</span>
        </h2>

        <div id="gauge-container">
          <h3
            style="
              margin-top: 0;
              margin-bottom: 10px;
              font-size: 14px;
              color: #aaa;
            "
          >
            아이템 게이지
          </h3>
          <div id="gauge-slots">
            <span class="slot" id="slot-1"></span>
            <span class="slot" id="slot-2"></span>
            <span class="slot" id="slot-3"></span>
            <span class="slot" id="slot-4"></span>
            <span class="slot" id="slot-5"></span>
          </div>
        </div>

        <hr
          style="
            border-color: #34495e;
            width: 100%;
            transition: border-color 0.4s;
          "
        />

        <h3
          id="current-mode-text"
          style="
            color: #fff;
            text-align: center;
            margin: 0;
            text-shadow: 0 0 5px #fff;
          "
        >
          -
        </h3>

        <h2 class="panel-title">레벨: <span id="level">1</span></h2>
        <h2 class="panel-title">점수: <span id="score">0</span></h2>

        <div id="next-piece-container">
          <h3 class="panel-title next-title">NEXT</h3>
          <canvas id="next-canvas" width="160" height="320"></canvas>
        </div>

        <button id="start-btn">로비로 가기</button>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
